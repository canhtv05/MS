server:
  port: 1000

app:
  api-prefix: /api/v1

logging:
  level:
    '[root]': WARN
    '[com.leaf]': INFO
    '[org.springframework]': WARN

spring:
  application:
    name: gateway

  profiles:
    include: framework

  output:
    ansi:
      enabled: always

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: lb://auth
              predicates:
                - Path=${app.api-prefix}/auth/**
              filters:
                - StripPrefix=2

            - id: file-service
              uri: lb://file
              predicates:
                - Path=${app.api-prefix}/files/**
              filters:
                - StripPrefix=2

            - id: profile-service
              uri: lb://user-profile
              predicates:
                - Path=${app.api-prefix}/user-profile/**
              filters:
                - StripPrefix=2

            - id: notification-service
              uri: lb://notification
              predicates:
                - Path=${app.api-prefix}/notifications/**
              filters:
                - StripPrefix=2

            - id: graphql-bff
              uri: lb://graphql-bff
              predicates:
                - Path=${app.api-prefix}/graphql/**
              filters:
                - StripPrefix=2

            - id: websocket-service-ws
              uri: lb:ws://websocket-service
              predicates:
                - Path=/ws/**
              filters:
                - SetPath=/ws

            - id: websocket-service-http
              uri: lb://websocket-service
              predicates:
                - Path=${app.api-prefix}/presence/**
              filters:
                - StripPrefix=2

grpc:
  client:
    auth-service:
      address: static://localhost:2001
      negotiationType: plaintext
    file-service:
      address: static://localhost:2002
      negotiationType: plaintext
    profile-service:
      address: static://localhost:2003
      negotiationType: plaintext
    notification-service:
      address: static://localhost:2004
      negotiationType: plaintext
    graphql-bff:
      address: static://localhost:2006
      negotiationType: plaintext

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    instance-id: ${spring.application.name}:${server.port}
