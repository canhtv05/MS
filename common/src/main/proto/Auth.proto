syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.leaf.common.grpc";
option java_outer_classname = "AuthProto";
import "google/protobuf/timestamp.proto";
import "Common.proto";

service AuthGrpcService {
  rpc refreshToken (RefreshTokenGrpcRequest) returns (RefreshTokenGrpcResponse);
  rpc verifyEmailToken (VerifyEmailTokenGrpcDTO) returns (VerifyEmailTokenGrpcDTO);
  rpc authMe (AuthMeGrpcRequest) returns (AuthMeGrpcResponse);
}

message RefreshTokenGrpcRequest {
  string refreshToken = 1;
  string channel = 2;
}

message RefreshTokenGrpcResponse {
  string accessToken = 1;
  string refreshToken = 2;
}

message VerifyEmailTokenGrpcDTO {
  string username = 1;
  string fullname = 2;
  string email = 3;
  google.protobuf.Timestamp expiredAt = 4;
  string jti = 5;
}

message AuthMeGrpcRequest {
  string userId = 1;
}

message AuthMeGrpcResponse {
  string username = 1;
  string email = 2;
  bool isGlobal = 3;
  repeated string roles = 4;
  repeated string roleLabels = 5;
  repeated string permissions = 6;
  string secretKey = 7;
  string channel = 8;
}
