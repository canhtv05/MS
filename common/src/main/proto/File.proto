syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.leaf.common.grpc";
option java_outer_classname = "FileProto";

import "google/protobuf/timestamp.proto";
import "Common.proto";

service FileGrpcService {
    rpc uploadFiles(UploadFilesGrpcRequest) returns (FileGrpcResponse);
    rpc uploadImage(UploadOneImageGrpcRequest) returns (ImageGrpcResponse);
    rpc uploadVideo(UploadOneVideoGrpcRequest) returns (VideoGrpcResponse);
    rpc getFileByIds(GetFilesByIdsGrpcRequest) returns (GetFilesByIdsGrpcResponse);
    rpc deleteById(DeleteByIdGrpcRequest) returns (DeleteByIdGrpcResponse);
    rpc getFileImages(GetFileImagesGrpcRequest) returns (GetFileImagesGrpcResponse);
}

message UploadOneImageGrpcRequest {
    bytes file = 1;
    ResourceTypeGrpc resourceType = 2;
    string userId = 3;
}

message UploadOneVideoGrpcRequest {
    bytes file = 1;
    ResourceTypeGrpc resourceType = 2;
    string userId = 3;
}

message UploadFilesGrpcRequest {
    repeated bytes files = 1;
    ResourceTypeGrpc resourceType = 2;
    string userId = 3;
}

message GetFilesByIdsGrpcRequest {
    repeated string ids = 1;
}

message GetFilesByIdsGrpcResponse {
    repeated FileGrpcResponse files = 1;
}

message DeleteByIdGrpcRequest {
    string fileId = 1;
}

message DeleteByIdGrpcResponse {
    bool success = 1;
}

message VideoGrpcResponse {
    double playtimeSeconds = 1;
    string playtimeString = 2;
    string contentType = 3;
    string videoUrl = 4;
    string thumbnailUrl = 5;
    string previewVttUrl = 6;
    int64 fileSize = 7;
    string originFileName = 8;
    google.protobuf.Timestamp createdAt = 9;
    ResourceTypeGrpc resourceType = 10;
}

message ImageGrpcResponse {
    string contentType = 1;
    string imageUrl = 2;
    int64 fileSize = 3;
    string originFileName = 4;
    google.protobuf.Timestamp createdAt = 5;
    ResourceTypeGrpc resourceType = 6;
}

message FileGrpcResponse {
    string ownerId = 1;
    int64 totalSize = 2;
    repeated VideoGrpcResponse videos = 3;
    repeated ImageGrpcResponse images = 4;
    ResourceTypeGrpc resourceType = 5;
    google.protobuf.Timestamp createdAt = 6;
    google.protobuf.Timestamp updatedAt = 7;
}

message GetFileImagesGrpcRequest {
    string userId = 1;
    repeated ResourceTypeGrpc resourceTypes = 2;
    SearchGrpcRequest searchRequest = 3;
}

message GetFileImagesGrpcResponse {
    repeated ImageGrpcResponse data = 1;
    PageGrpcResponse pagination = 2;
}

enum ResourceTypeGrpc {
    RESOURCE_TYPE_UNSPECIFIED = 0;
    RESOURCE_TYPE_AVATAR = 1;
    RESOURCE_TYPE_COVER = 2;
    RESOURCE_TYPE_POST = 3;
    RESOURCE_TYPE_COMMENT = 4;
    RESOURCE_TYPE_MESSAGE = 5;
    RESOURCE_TYPE_OTHER = 6;
}
