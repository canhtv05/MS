syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "Common.proto";

option java_multiple_files = true;
option java_package = "com.leaf.common.grpc";
option java_outer_classname = "UserProfile";

service UserProfileGrpcService {
    rpc createUserProfile(UserProfileGrpcDTO) returns (UserProfileGrpcDTO);
    rpc getUserProfile(UserProfileIdGrpcRequest) returns (UserProfileGrpcResponse);
    rpc getUserProfilePrivacy(UserProfileIdGrpcRequest) returns (UserProfilePrivacyGrpcDTO);
    rpc getUserProfileIntroduce(UserProfileIdGrpcRequest) returns (UserProfileIntroduceGrpcDTO);
}

message UserProfileGrpcDTO {
    string userId = 1;
    string fullname = 2;
}

message UserProfileIdGrpcRequest {
    string userId = 1;
}

message UserProfileGrpcResponse {
    string userId = 1;
    string fullname = 2;
    google.protobuf.Timestamp createdDate = 3;
    string avatarUrl = 4;
    string coverUrl = 5;
    google.protobuf.Timestamp lastOnlineAt = 6;
    int64 followersCount = 7;
    int64 followingCount = 8;
    string id = 9;
    string bio = 10;
}

message UserProfilePrivacyGrpcRequest {
    string userId = 1;
    PrivacyLevelGrpc profileVisibility = 2;
    PrivacyLevelGrpc friendsVisibility = 3;
    PrivacyLevelGrpc postsVisibility = 4;
    PrivacyLevelGrpc introduceVisibility = 5;
    PrivacyLevelGrpc galleryVisibility = 6;
    string id = 7;
}

message UserProfilePrivacyGrpcDTO {
    string id = 1;
    string userId = 2;
    PrivacyLevelGrpc profileVisibility = 3;
    PrivacyLevelGrpc friendsVisibility = 4;
    PrivacyLevelGrpc postsVisibility = 5;
    PrivacyLevelGrpc introduceVisibility = 6;
    PrivacyLevelGrpc galleryVisibility = 7;
}

message UserProfileIntroduceGrpcRequest {
    string userId = 1;
    string city = 2;
    string hometown = 3;
    string jobTitle = 4;
    string company = 5;
    string school = 6;
    string websiteUrl = 7;
    string githubUrl = 8;
    string linkedinUrl = 9;
    string xUrl = 10;
    string instagramUrl = 11;
    string tiktokUrl = 12;
    string facebookUrl = 13;
    google.protobuf.Timestamp dob = 14;
    GenderGrpc gender = 15;
    RelationshipStatusGrpc relationshipStatus = 16;
    string phoneNumber = 17;
    repeated InterestGrpc interests = 18;
    string id = 19;
}

message InterestGrpc {
    string id = 1;
    string title = 2;
    string color = 3;
    string code = 4;
    string createdBy = 5;
    google.protobuf.Timestamp createdDate = 6;
    string modifiedBy = 7;
    google.protobuf.Timestamp modifiedDate = 8;
}

message InterestGrpcRequest {
    string id = 1;
    string title = 2;
    string color = 3;
    string code = 4;
    string createdBy = 5;
    google.protobuf.Timestamp createdDate = 6;
    string modifiedBy = 7;
    google.protobuf.Timestamp modifiedDate = 8;
}

message InterestGrpcDTO {
    string id = 1;
    string title = 2;
    string color = 3;
    string code = 4;
    string createdBy = 5;
    google.protobuf.Timestamp createdDate = 6;
    string modifiedBy = 7;
    google.protobuf.Timestamp modifiedDate = 8;
}

message UserProfileIntroduceGrpcDTO {
    string id = 1;
    string userId = 2;
    string city = 3;
    string hometown = 4;
    string jobTitle = 5;
    string company = 6;
    string school = 7;
    string websiteUrl = 8;
    string githubUrl = 9;
    string linkedinUrl = 10;
    string xUrl = 11;
    string instagramUrl = 12;
    string tiktokUrl = 13;
    string facebookUrl = 14;
    google.protobuf.Timestamp dob = 15;
    GenderGrpc gender = 16;
    RelationshipStatusGrpc relationshipStatus = 17;
    string phoneNumber = 18;
    repeated InterestGrpcDTO interests = 19;
}
